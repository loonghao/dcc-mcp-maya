name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Python 3.8+ with stock CPython (abi3 dcc-mcp-core wheels). Maya 2022 / py3.7
  # is covered by test-mayapy-py37 below — not setup-python 3.7.
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
        run: >
          pytest tests/
          --ignore=tests/e2e
          --ignore=tests/e2e_standalone
          -v --tb=short
          --cov=dcc_mcp_maya --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Maya 2022 ships Python 3.7 — exercise the real mayapy interpreter + cp37 core wheel.
  test-mayapy-py37:
    name: Test (mayapy / Maya 2022 / Python 3.7)
    runs-on: ubuntu-latest
    container:
      image: tahv/mayapy:2022
    env:
      DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
      DCC_MCP_DISABLE_FILE_LOGGING: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify mayapy (Python 3.7)
        run: |
          mayapy -c "
          import sys
          assert sys.version_info[:2] == (3, 7), sys.version
          import maya.standalone
          maya.standalone.initialize()
          from maya import cmds
          print('Maya', cmds.about(version=True), 'Python', sys.version.split()[0])
          "

      - name: Install dependencies into mayapy
        run: |
          mayapy -m pip install --quiet certifi
          export SSL_CERT_FILE="$(mayapy -c 'import certifi; print(certifi.where())')"
          mayapy -m pip install --upgrade pip
          mayapy -m pip install -e ".[dev]"

      - name: Run tests (mayapy)
        run: |
          mayapy -c "
          import maya.standalone
          maya.standalone.initialize()

          import os
          import subprocess
          import sys

          env = dict(os.environ)
          env.setdefault('DCC_MCP_ALLOW_AMBIENT_PYTHON', '1')
          env.setdefault('DCC_MCP_DISABLE_FILE_LOGGING', '1')

          result = subprocess.run(
              [
                  sys.executable, '-m', 'pytest', 'tests/',
                  '--ignore=tests/e2e',
                  '--ignore=tests/e2e_standalone',
                  '-v', '--tb=short',
                  '--cov=dcc_mcp_maya', '--cov-report=term',
              ],
              env=env,
          )
          raise SystemExit(result.returncode)
          "

      - name: Run Maya plugin load smoke
        run: |
          mayapy -c "
          import maya.standalone
          maya.standalone.initialize(name='python')

          import os
          import subprocess
          import sys

          env = dict(os.environ)
          env.setdefault('DCC_MCP_ALLOW_AMBIENT_PYTHON', '1')
          env.setdefault('DCC_MCP_DISABLE_FILE_LOGGING', '1')
          env.setdefault('DCC_MCP_GATEWAY_PORT', '0')
          env.setdefault('DCC_MCP_MAYA_SIDECAR', '0')

          result = subprocess.run(
              [
                  sys.executable, '-m', 'pytest',
                  'tests/e2e_standalone/test_plugin_load_smoke.py',
                  '-m', 'e2e',
                  '-v', '--tb=short',
              ],
              env=env,
          )
          raise SystemExit(result.returncode)
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  lint-skills:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Install dcc-mcp-cli
        run: |
          export DCC_MCP_INSTALL_DIR="$RUNNER_TEMP/dcc-mcp-bin"
          curl -fsSL https://raw.githubusercontent.com/loonghao/dcc-mcp-core/main/scripts/install-cli.sh | bash
          echo "$DCC_MCP_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Lint SKILL.md files
        run: python tools/lint_skills.py --error-only

      - name: Lint tools.yaml affinity (issue #84)
        run: python tools/lint_skill_affinity.py

      - name: Lint skills with dcc-mcp-cli
        run: dcc-mcp-cli lint src/dcc_mcp_maya/skills

      - name: Check EN/ZH documentation parity (issue #88)
        run: python tools/check_doc_parity.py

  cli-smoke:
    name: dcc-mcp-cli Service Smoke
    runs-on: ubuntu-latest
    env:
      DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
      DCC_MCP_DISABLE_FILE_LOGGING: "1"
      DCC_MCP_GATEWAY_PORT: "18765"
      DCC_MCP_MAYA_SIDECAR: "0"
      DCC_MCP_BASE_URL: "http://127.0.0.1:18765"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install dcc-mcp-cli
        run: |
          export DCC_MCP_INSTALL_DIR="$RUNNER_TEMP/dcc-mcp-bin"
          curl -fsSL https://raw.githubusercontent.com/loonghao/dcc-mcp-core/main/scripts/install-cli.sh | bash
          echo "$DCC_MCP_INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Start Maya adapter service
        run: |
          python - <<'PY' > "$RUNNER_TEMP/maya-cli-smoke.log" 2>&1 &
          import time
          from dcc_mcp_maya import start_server

          handle = start_server(port=18766, gateway_port=18765, enable_gateway_failover=False)
          print(handle.mcp_url(), flush=True)
          try:
              while True:
                  time.sleep(1)
          finally:
              handle.shutdown()
          PY
          echo "$!" > "$RUNNER_TEMP/maya-cli-smoke.pid"

      - name: Probe service with dcc-mcp-cli
        run: |
          set -o pipefail

          cleanup() {
            if [ -f "$RUNNER_TEMP/maya-cli-smoke.pid" ]; then
              kill "$(cat "$RUNNER_TEMP/maya-cli-smoke.pid")" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if dcc-mcp-cli health; then
              break
            fi
            sleep 1
          done

          dcc-mcp-cli health

          TOOL_SLUG=""
          for _ in $(seq 1 30); do
            if ! dcc-mcp-cli search --query scene --limit 10 | tee "$RUNNER_TEMP/dcc-mcp-cli-search.json"; then
              sleep 1
              continue
            fi
            TOOL_SLUG="$(python - <<'PY'
          import json
          import os

          preferred = "maya_scene__get_session_info"
          path = os.path.join(os.environ["RUNNER_TEMP"], "dcc-mcp-cli-search.json")
          try:
              payload = json.load(open(path, encoding="utf-8"))
          except Exception:
              raise SystemExit(0)
          fallback = ""
          for hit in payload.get("hits", []) or payload.get("tools", []):
              backend_tool = hit.get("backend_tool") or hit.get("tool") or hit.get("name") or ""
              slug = hit.get("slug") or hit.get("tool_slug") or hit.get("name") or ""
              if slug and not fallback:
                  fallback = slug
              if slug and (backend_tool == preferred or slug.endswith(preferred)):
                  print(slug)
                  break
          else:
              print(fallback)
          PY
          )"
            if [ -n "$TOOL_SLUG" ]; then
              break
            fi
            sleep 1
          done

          python - <<'PY'
          import json
          import os

          path = os.path.join(os.environ["RUNNER_TEMP"], "dcc-mcp-cli-search.json")
          payload = json.load(open(path, encoding="utf-8"))
          hits = payload.get("hits", []) or payload.get("tools", [])
          slugs = []
          for hit in hits:
              slug = hit.get("slug") or hit.get("tool_slug") or hit.get("name") or ""
              if slug:
                  slugs.append(slug)
          if not slugs:
              raise SystemExit(f"dcc-mcp-cli search returned no describable slug: {payload!r}")
          PY

          echo "Resolved tool slug: $TOOL_SLUG"
          dcc-mcp-cli describe "$TOOL_SLUG"

      - name: Dump service log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/maya-cli-smoke.log" || true
