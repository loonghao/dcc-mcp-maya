name: E2E (mayapy)

# End-to-end tests that run inside a real Maya standalone interpreter.
# Uses the tahv/mayapy Docker image which ships /usr/autodesk/maya/bin/mayapy
# and exposes it as both `mayapy` and `python` on PATH.
#
# This workflow tests the **packaged .mod module** (as users would install it)
# rather than pip-installing the source tree.  This catches packaging issues
# like missing imports or broken sys.path that the old pip-based E2E missed.
#
# References:
#   https://hub.docker.com/r/tahv/mayapy
#   https://github.com/tahv/docker-mayapy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E mayapy ${{ matrix.maya-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - maya-version: "2025"
            python-version: "3.11"
          - maya-version: "2024"
            python-version: "3.10"
          - maya-version: "2023"
            python-version: "3.9"
          - maya-version: "2022"
            python-version: "3.7"

    container:
      image: tahv/mayapy:${{ matrix.maya-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Maya standalone
        run: |
          mayapy -c "
          import maya.standalone
          maya.standalone.initialize()
          import sys
          from maya import cmds
          print('Maya version:', cmds.about(version=True))
          print('Python version:', sys.version)
          "

      # ── Phase 0: Install test dependencies into mayapy ────────────────
      # pytest and other dev deps must be installed so E2E tests can run.
      # We install only test/dev extras, NOT the source package — the E2E
      # tests use the packaged .mod module, not a pip-editable install.

      - name: Install test dependencies into mayapy
        run: |
          mayapy -m pip install --upgrade pip
          # Install dev/test extras only; dcc_mcp_maya itself is tested via
          # the packaged .mod module (not pip-installed source).
          mayapy -m pip install "pytest>=7" pytest-cov pytest-mock pyyaml "tomli; python_version<'3.11'"

      # ── Phase 1: Assemble the .mod module ──────────────────────────────
      # We build the packaged module *exactly* as release.yml does, then
      # deploy it to the Maya modules directory so mayapy can find it.

      - name: Assemble .mod module
        run: |
          # Ensure up-to-date CA certificates are available for the system
          # Python (used by assemble_mod.py to query PyPI). The tahv/mayapy
          # containers (especially 2022/2023) ship outdated system certs.
          pip install --quiet certifi
          export SSL_CERT_FILE="$(python -c 'import certifi; print(certifi.where())')"
          python packaging/assemble_mod.py \
            --version "0.0.0-ci" \
            --platform linux \
            --output dist/mod \
            --project-root .

      - name: Deploy .mod module to Maya modules directory
        run: |
          # Maya looks for modules in ~/maya/modules/ on Linux
          MAYA_MODULES="$HOME/maya/modules"
          mkdir -p "$MAYA_MODULES"

          # Remove any previous deployment
          rm -rf "$MAYA_MODULES/dcc-mcp-maya"

          # Deploy the assembled module
          # Portable variant is in dist/mod/portable/dcc-mcp-maya
          cp -R dist/mod/portable/dcc-mcp-maya "$MAYA_MODULES/dcc-mcp-maya"

          echo "Deployed module to $MAYA_MODULES/dcc-mcp-maya"
          ls -la "$MAYA_MODULES/dcc-mcp-maya/"

      # ── Phase 2: Post-install verification ─────────────────────────────
      # Run the post_install.py script that verifies the packaged module
      # works correctly in mayapy standalone mode.

      # ── Phase 3: E2E tests using the packaged module ───────────────────
      # The E2E tests exercise the server, skills, and plugin lifecycle
      # using the packaged .mod module, not a pip install.

      - name: Run E2E tests (Maya standalone, packaged module)
        run: |
          # $HOME is expanded by bash — cannot use it in the env: block above.
          export DCC_MCP_MAYA_MOD_DIR="$HOME/maya/modules/dcc-mcp-maya"
          export PYTHONPATH="$HOME/maya/modules/dcc-mcp-maya/python"

          mayapy -c "
          import maya.standalone
          maya.standalone.initialize()

          import sys, subprocess, os
          from pathlib import Path

          # Ensure packaged python/ is on sys.path for this process too
          mod_python = str(Path(os.path.expanduser('~/maya/modules/dcc-mcp-maya/python')))
          if mod_python not in sys.path:
              sys.path.insert(0, mod_python)

          # Run e2e tests via pytest inside mayapy
          # Only collect test_e2e_maya_standalone.py to avoid importing
          # other test modules that need dcc_mcp_maya in site-packages.
          result = subprocess.run(
              [sys.executable, '-m', 'pytest',
               'tests/test_e2e_maya_standalone.py',
               '-v', '--tb=short', '-m', 'e2e'],
              env=dict(os.environ),
          )
          sys.exit(result.returncode)
          "

      # ── Phase 4: MCP connectivity test with mcporter ───────────────────

      - name: Setup Node.js for mcporter
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Test MCP connectivity with mcporter
        run: |
          set -e

          # The packaged .mod bundles dcc_mcp_core alongside dcc_mcp_maya
          # under python/. Exporting PYTHONPATH so the tool scripts that
          # the server spawns as subprocesses can import dcc_mcp_core too
          # (Phase 3's pytest step does the same). Without this the outer
          # mayapy process is fine but every tool call returns
          # "ModuleNotFoundError: No module named 'dcc_mcp_core'".
          export PYTHONPATH="$HOME/maya/modules/dcc-mcp-maya/python"

          # Sentinel file used to signal clean shutdown to mayapy. Polling
          # for it lets mayapy exit through maya.standalone.uninitialize()
          # instead of being SIGTERM'd inside sleep(), which would trigger
          # Maya's crash handler.
          SENTINEL=/tmp/mcporter.done
          rm -f "$SENTINEL"

          # Start Maya MCP server in background (standalone mode, port 7891)
          # Use the packaged module's python/ directory on sys.path
          mayapy -c "
          import maya.standalone
          maya.standalone.initialize()
          import sys, os, time
          # Add the packaged module's python/ to sys.path
          mod_python = os.path.expanduser('~/maya/modules/dcc-mcp-maya/python')
          if mod_python not in sys.path:
              sys.path.insert(0, mod_python)
          import dcc_mcp_maya
          handle = dcc_mcp_maya.start_server(port=7891)
          print('MCP server running at:', handle.mcp_url())
          # Wait for sentinel file (touched by the outer shell after the
          # mcporter calls complete) so we can tear down cleanly.
          sentinel = '$SENTINEL'
          for _ in range(120):
              if os.path.exists(sentinel):
                  break
              time.sleep(1)
          dcc_mcp_maya.stop_server()
          maya.standalone.uninitialize()
          " &
          SERVER_PID=$!

          # Always signal mayapy and reap it, even if a step below fails.
          trap 'touch "$SENTINEL" 2>/dev/null || true; wait $SERVER_PID 2>/dev/null || true' EXIT

          # Wait for server to be ready, then verify via Python urllib
          sleep 10
          python -c "
          import urllib.request, json, time, sys
          url = 'http://127.0.0.1:7891/mcp'
          body = json.dumps({
              'jsonrpc': '2.0', 'id': 0, 'method': 'initialize',
              'params': {'protocolVersion': '2025-03-26', 'capabilities': {},
                         'clientInfo': {'name': 'ci', 'version': '1'}}
          }).encode()
          for attempt in range(5):
              try:
                  req = urllib.request.Request(url, data=body,
                      headers={'Content-Type': 'application/json'}, method='POST')
                  with urllib.request.urlopen(req, timeout=5) as r:
                      d = json.loads(r.read())
                      assert d['result']['serverInfo']['name'] == 'maya-mcp', d
                      print('MCP initialize: OK')
                      sys.exit(0)
              except Exception as e:
                  print(f'Attempt {attempt+1} failed: {e}')
                  time.sleep(3)
          sys.exit(1)
          "
          echo "MCP initialize: OK"

          # mcporter call can return exit-0 even when the server replies
          # with "Unknown tool", which silently hides real breakage. Wrap
          # each call so any error marker in the output fails the step.
          #
          # Uses the URL-based selector form `<url>.<tool>` documented in
          # `mcporter call --help` as "Call a tool by full HTTP URL
          # (auto-registers ad-hoc)". The server.tool form (e.g.
          # maya-ci.load_skill) only works for pre-configured servers;
          # --http-url + --name on every call still surfaces as
          # "Unknown tool: maya-ci.<x>" because the ad-hoc slug isn't
          # consulted when resolving the call selector.
          MCP_URL=http://127.0.0.1:7891/mcp
          mcporter_call() {
              tool="$1"
              shift
              out=$(npx mcporter call --allow-http "$MCP_URL.$tool" "$@" 2>&1)
              printf '%s\n' "$out"
              case "$out" in
                  *"Unknown tool"*|*"Error:"*|*"error:"*)
                      echo "::error::mcporter call failed: $tool $*"
                      return 1
                      ;;
              esac
          }

          # List Maya tools via mcporter (still uses --name for the
          # readable "maya-ci" heading in the catalog listing).
          npx --yes mcporter list \
            --http-url "$MCP_URL" \
            --name maya-ci \
            --allow-http

          # After the 0.13 lazy-load refactor, skills are exposed as
          # __skill__* stubs until load_skill is called. Exercise the load
          # path for the three skills whose tools Phase 3 xfail-covers.
          # Issued as three scalar calls — mcporter's flag-based CLI has
          # known issues parsing array arguments (steipete/mcporter#126).
          mcporter_call load_skill skill_name=maya-scene
          mcporter_call load_skill skill_name=maya-primitives
          mcporter_call load_skill skill_name=maya-scripting

          # NOTE: tools/call for the loaded skills (get_session_info,
          # create_sphere, execute_python, …) is intentionally not
          # exercised here. dcc-mcp-core's subprocess executor spawns
          # each script with `sys.executable` without calling
          # `maya.standalone.initialize()` in the child, so every tool
          # that touches `maya.cmds` fails with
          # `AttributeError: module 'maya.cmds' has no attribute 'about'`
          # (cmds stubs are present but commands are not wired up).
          # This is a pre-existing upstream issue and is already covered
          # by the xfail-marked tests in Phase 3's pytest run
          # (tests/test_e2e_maya_standalone.py —
          # test_tools_call_get_session_info_via_http etc.). Re-enable
          # the calls once dcc-mcp-core initializes Maya in the child.

          echo "mcporter connectivity tests: PASSED"
          # EXIT trap signals mayapy via sentinel and waits for clean teardown.
