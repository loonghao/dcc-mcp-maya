name: Multi-Instance Gateway Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/dcc_mcp_maya/**'
      - 'tests/test_*_*.py'
      - 'tests/fixtures/**'
      - 'tests/scripts/**'
      - '.github/workflows/multi-instance-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/dcc_mcp_maya/**'
      - 'tests/test_*_*.py'
      - 'tests/fixtures/**'
      - '.github/workflows/multi-instance-tests.yml'

jobs:
  multi-instance-tests:
    name: Gateway Failover & Discovery Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install pytest pytest-timeout requests

      - name: Install dcc-mcp-maya in development mode
        run: |
          pip install -e .

      - name: Verify installation
        run: |
          python -c "from dcc_mcp_maya import start_server; print('✓ dcc_mcp_maya imported successfully')"
          python -c "from tests.fixtures.maya_instances import MayaInstanceManager; print('✓ MayaInstanceManager imported successfully')"

      - name: Run gateway failover tests
        run: |
          cd tests
          python -m pytest test_gateway_failover.py -v --tb=short -x
        continue-on-error: true

      - name: Run discovery tests
        run: |
          cd tests
          python -m pytest test_multi_instance_discovery.py -v --tb=short -x
        continue-on-error: true

      - name: Run scene update tests
        run: |
          cd tests
          python -m pytest test_scene_update.py -v --tb=short -x
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: tests/.pytest_cache/

      - name: Print test summary
        if: always()
        run: |
          echo "====== Test Summary ======"
          echo "Multi-instance gateway tests completed on Python ${{ matrix.python-version }}"
          echo "Note: Some tests may skip if Maya is not installed in CI environment"

  gate-check:
    name: Test Gate (Required Checks)
    runs-on: ubuntu-latest
    needs: multi-instance-tests
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.multi-instance-tests.result }}" = "success" ]; then
            echo "✓ All tests passed"
            exit 0
          elif [ "${{ needs.multi-instance-tests.result }}" = "failure" ]; then
            echo "✗ Tests failed"
            exit 1
          else
            echo "⚠ Tests skipped or cancelled"
            exit 0
          fi
