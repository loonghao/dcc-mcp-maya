name: Multi-Instance Gateway Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/dcc_mcp_maya/**'
      - 'tests/test_*_*.py'
      - 'tests/fixtures/**'
      - 'tests/scripts/**'
      - '.github/workflows/multi-instance-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/dcc_mcp_maya/**'
      - 'tests/test_*_*.py'
      - 'tests/fixtures/**'
      - '.github/workflows/multi-instance-tests.yml'

jobs:
  docker-multi-instance-tests:
    name: Docker Multi-Version (${{ matrix.maya-version }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      matrix:
        maya-version: ['2022', '2023', '2024', '2025']
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify Docker and pull Maya image
        run: |
          docker --version
          echo "Pulling Docker image: tahv/mayapy:${{ matrix.maya-version }}"
          docker pull tahv/mayapy:${{ matrix.maya-version }} 2>&1 || echo "⚠️  Image pull failed; tests may skip if local pull unavailable"

      - name: Verify installation
        run: |
          python -c "from dcc_mcp_maya import start_server; print('✓ dcc_mcp_maya imported successfully')"
          python -c "from tests.fixtures.maya_instances import MayaInstanceManager; print('✓ MayaInstanceManager imported successfully')"
          python -c "from tests.fixtures.docker_maya import DockerMayaInstanceManager; print('✓ DockerMayaInstanceManager imported successfully')"
          python -c "from tests.fixtures.instance_factory import get_instance_manager; print('✓ instance_factory imported successfully')"

      - name: Set Docker image env
        run: echo "DCC_MCP_MAYA_DOCKER_IMAGE=tahv/mayapy:${{ matrix.maya-version }}" >> $GITHUB_ENV

      - name: Run gateway failover tests (Docker Maya ${{ matrix.maya-version }})
        run: DCC_MCP_FORCE_DOCKER=1 python -m pytest tests/test_gateway_failover.py -v --tb=short -m integration

      - name: Run discovery tests (Docker Maya ${{ matrix.maya-version }})
        run: DCC_MCP_FORCE_DOCKER=1 python -m pytest tests/test_multi_instance_discovery.py -v --tb=short -m integration

      - name: Run scene update tests (Docker Maya ${{ matrix.maya-version }})
        run: DCC_MCP_FORCE_DOCKER=1 python -m pytest tests/test_scene_update.py -v --tb=short -m integration

      - name: Run Docker integration tests
        run: DCC_MCP_FORCE_DOCKER=1 python -m pytest tests/test_docker_integration.py -v --tb=short -m e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-maya${{ matrix.maya-version }}-py${{ matrix.python-version }}
          path: tests/.pytest_cache/

      - name: Print test summary
        if: always()
        run: |
          echo "====== Test Summary ======"
          echo "Multi-instance Docker tests completed"
          echo "Maya version: ${{ matrix.maya-version }}"
          echo "Python version: ${{ matrix.python-version }}"
          echo "Note: Some tests may skip if Maya Docker image unavailable"

  local-instance-tests:
    name: Local Instance Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify installation
        run: |
          python -c "from dcc_mcp_maya import start_server; print('✓ dcc_mcp_maya imported successfully')"
          python -c "from tests.fixtures.maya_instances import MayaInstanceManager; print('✓ MayaInstanceManager imported successfully')"

      - name: Run gateway failover tests (local mode)
        run: python -m pytest tests/test_gateway_failover.py -v --tb=short -x -m integration

      - name: Run discovery tests (local mode)
        run: python -m pytest tests/test_multi_instance_discovery.py -v --tb=short -x -m integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-local-py${{ matrix.python-version }}
          path: tests/.pytest_cache/

      - name: Print test summary
        if: always()
        run: |
          echo "====== Test Summary ======"
          echo "Local instance tests completed on Python ${{ matrix.python-version }}"
          echo "Note: Tests will skip if mayapy is not installed locally"

  gate-check:
    name: Test Gate (Required Checks)
    runs-on: ubuntu-latest
    needs: [docker-multi-instance-tests, local-instance-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          docker_result='${{ needs.docker-multi-instance-tests.result }}'
          local_result='${{ needs.local-instance-tests.result }}'
          echo "docker-multi-instance-tests: $docker_result"
          echo "local-instance-tests:        $local_result"
          if [ "$docker_result" = "failure" ] || [ "$local_result" = "failure" ]; then
            echo "✗ One or more test jobs failed"
            exit 1
          elif [ "$docker_result" = "cancelled" ] || [ "$local_result" = "cancelled" ]; then
            echo "⚠ One or more test jobs were cancelled"
            exit 1
          else
            echo "✓ All required test jobs succeeded or were skipped"
            exit 0
          fi
