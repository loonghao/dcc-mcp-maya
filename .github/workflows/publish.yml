name: Publish to PyPI

# Trigger: merges to main auto-publish a new release.
# Uses PyPI Trusted Publishing (OIDC) — no tokens required.
#
# Setup required in PyPI:
#   1. Go to https://pypi.org/manage/project/dcc-mcp-maya/settings/publishing/
#   2. Add a new publisher:
#      - Owner: loonghao
#      - Repository: dcc-mcp-maya
#      - Workflow: publish.yml
#      - Environment: pypi

on:
  push:
    branches: [main]
    # Only trigger when version-relevant files change
    paths:
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/publish.yml"

  # Also allow manual dispatch for emergency releases
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but do not publish)"
        required: false
        default: "false"
        type: boolean

jobs:
  # ── 1. Run CI first ─────────────────────────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          pip install --upgrade pip
          pip install ".[dev]"
          pytest tests/ -v --tb=short

  # ── 2. Bump version and build wheel ─────────────────────────────────────────
  build:
    name: Build wheel
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Read version from pyproject.toml
        id: version
        run: |
          python -c "
          import tomllib, pathlib
          d = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print('version=' + d['project']['version'])
          " >> $GITHUB_OUTPUT

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to PyPI ──────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/project/dcc-mcp-maya/
    permissions:
      id-token: write   # required for Trusted Publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true

  # ── 4. Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: "dcc-mcp-maya v${{ needs.build.outputs.version }}"
          body: |
            ## dcc-mcp-maya v${{ needs.build.outputs.version }}

            ### Installation

            ```bash
            pip install dcc-mcp-maya==${{ needs.build.outputs.version }}
            ```

            ### Quick Start (inside Maya)

            ```python
            import dcc_mcp_maya
            handle = dcc_mcp_maya.start_server(port=8765)
            print(handle.mcp_url())   # http://127.0.0.1:8765/mcp
            ```

            Connect any MCP host (Claude Desktop, OpenClaw, Cursor) to the URL above.

            ### Full Changelog

            See [CHANGELOG](https://github.com/loonghao/dcc-mcp-maya/releases) for details.
          files: dist/*
          generate_release_notes: true
          make_latest: true
