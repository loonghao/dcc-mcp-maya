name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  # ── Run tests first ────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nox
          pip install dcc-mcp-core dcc-mcp-ipc rpyc
          pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  # ── Build & release ZIP on merge to main ──────────────────────────────────
  make-zip:
    name: Build Install ZIP
    needs: test
    runs-on: ubuntu-latest
    # Run on main branch pushes (post-merge) OR on version tags
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install nox
        run: pip install nox

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # On main branch: use short SHA as pre-release version
            SHA=$(git rev-parse --short HEAD)
            # Read base version from pyproject.toml
            BASE=$(python -c "
          import re, pathlib
          txt = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', txt, re.M)
          print(m.group(1) if m else '0.1.0')
          ")
            VERSION="${BASE}-dev.${SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build install ZIP
        run: |
          nox -s make-zip -- --version ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcc-mcp-maya-${{ steps.version.outputs.version }}
          path: .zip/*.zip

      # Only create/update a GitHub Release on version tags
      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        uses: jaywcjlove/changelog-generator@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filter-author: (dependabot|renovate\[bot\]|dependabot\[bot\])
          filter: '[R|r]elease[d]\s+[v|V]\d(\.\d+){0,2}'
          template: |
            ## Bug Fixes
            {{fix}}
            ## Features
            {{feat}}
            ## Improvements
            {{refactor,perf}}
            ## Misc
            {{chore,style,ci||Nothing else}}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: ".zip/*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## DCC-MCP-Maya ${{ github.ref_name }}

            ### Quick Install
            1. Download `dcc-mcp-maya-*.zip`
            2. Extract it
            3. Windows: double-click `install.bat`
            4. macOS/Linux: run `bash install.sh`

            ### Start MCP HTTP Server
            - Windows: `start_mcp_server.bat`
            - macOS/Linux: `bash start_mcp_server.sh`

            ### Connect from Claude/OpenClaw/Cursor
            ```json
            {
              "mcpServers": {
                "maya": {
                  "url": "http://localhost:8765/mcp/v1",
                  "transport": "streamable-http"
                }
              }
            }
            ```

            ${{ steps.changelog.outputs.changelog }}

            Comparing Changes: ${{ steps.changelog.outputs.compareurl }}
