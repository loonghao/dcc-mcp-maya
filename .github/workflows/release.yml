name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for manual build-mod (e.g. v0.2.4). Leave empty to only run release-please."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ── Release Please — creates/updates the release PR ────────────────────────
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || inputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Build wheel — only when release-please creates a release ───────────────
  build:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install hatchling build

      - name: Run tests
        run: |
          pip install ".[dev]"
          pytest tests/ -v --tb=short

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI ─────────────────────────────────────────────────────────
  publish:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-maya
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: List dist
        run: ls -la dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true

  # ── Build Maya .mod module ZIPs ──────────────────────────────────────────────
  build-mod:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    strategy:
      matrix:
        include:
          - platform: win64
            runs-on: windows-latest
          - platform: linux
            runs-on: ubuntu-latest
          - platform: macos
            runs-on: macos-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install assemble dependencies
        run: pip install dcc-mcp-core

      - name: Assemble .mod module
        run: |
          # Use release-please version or strip 'v' from manual tag_name input
          VERSION="${{ needs.release-please.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ inputs.tag_name }}"
            VERSION="${VERSION#v}"  # strip leading 'v'
          fi
          python packaging/assemble_mod.py \
            --version "$VERSION" \
            --platform ${{ matrix.platform }} \
            --output dist/mod \
            --project-root .
        shell: bash

      - name: Upload mod artifact
        uses: actions/upload-artifact@v7
        with:
          name: mod-${{ matrix.platform }}
          path: dist/mod/*.zip

  # ── Attach wheels to GitHub Release ─────────────────────────────────────────
  attach-release-assets:
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Attach wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # ── Attach .mod module ZIPs to GitHub Release ───────────────────────────────
  attach-mod-release:
    needs: [release-please, build-mod]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all mod artifacts
        uses: actions/download-artifact@v8
        with:
          path: mod-artifacts/
          pattern: mod-*

      - name: List mod artifacts
        run: find mod-artifacts/ -name "*.zip" -ls

      - name: Attach mod ZIPs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
          files: mod-artifacts/**/*.zip
