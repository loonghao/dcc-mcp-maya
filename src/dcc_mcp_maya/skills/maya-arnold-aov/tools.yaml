tools:
- name: add_aov
  execution: sync
  affinity: main
  group: rendering
- name: delete_aov
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: rendering
- name: enable_aov
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: rendering
- name: list_aovs
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
- name: set_aov_attribute
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: rendering
