defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: add_attribute

- name: delete_attribute
  annotations:
    destructive_hint: true
    idempotent_hint: true

- name: get_attribute
  annotations:
    read_only_hint: true
    idempotent_hint: true

- name: list_attributes
  annotations:
    read_only_hint: true
    idempotent_hint: true

- name: set_attribute
  annotations:
    idempotent_hint: true
