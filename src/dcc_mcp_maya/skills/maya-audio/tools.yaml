defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: import_audio

- name: list_audio
  annotations:
    read_only_hint: true
    idempotent_hint: true

- name: remove_audio
  annotations:
    destructive_hint: true
    idempotent_hint: true

- name: set_timeline_audio
  annotations:
    idempotent_hint: true
