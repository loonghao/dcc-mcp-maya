defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: create_blend_shape
  group: rigging

- name: get_blend_shape_weights
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rigging

- name: list_blend_shapes
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rigging

- name: set_blend_shape_weight
  annotations:
    idempotent_hint: true
  group: rigging
