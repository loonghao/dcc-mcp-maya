tools:
- name: attach_geometry_cache
  execution: async
  affinity: main
  timeout_hint_secs: 300
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_geometry_cache
  execution: async
  affinity: main
  timeout_hint_secs: 300
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: delete_geometry_cache
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    idempotent_hint: true
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: list_geometry_caches
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
