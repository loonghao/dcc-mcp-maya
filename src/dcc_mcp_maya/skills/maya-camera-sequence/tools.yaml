defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: create_shot
  group: animation

- name: delete_shot
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: animation

- name: list_shots
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: animation

- name: set_shot_range
  annotations:
    idempotent_hint: true
  group: animation
