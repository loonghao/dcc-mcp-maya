defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: bake_cloth_cache
  execution: async

  timeout_hint_secs: 600
  group: simulation-fx

- name: create_ncloth
  group: simulation-fx

- name: list_ncloth_objects
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: set_ncloth_attribute
  annotations:
    idempotent_hint: true
  group: simulation-fx
