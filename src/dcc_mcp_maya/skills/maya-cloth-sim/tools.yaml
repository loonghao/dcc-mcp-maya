tools:
- name: bake_cloth_cache
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_ncloth
  execution: sync
  affinity: main
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: list_ncloth_objects
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_ncloth_attribute
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
