defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: apply_gamma_correction
  annotations:
    idempotent_hint: true
  group: shading-lighting

- name: get_color_management_info
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: shading-lighting

- name: set_rendering_space
  annotations:
    idempotent_hint: true
  group: shading-lighting

- name: set_view_transform
  annotations:
    idempotent_hint: true
  group: shading-lighting
