tools:
- name: add_pole_vector_constraint
  execution: sync
  affinity: main
  group: animation
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: bake_constraint
  execution: sync
  affinity: main
  group: animation
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: get_constraint_weights
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: animation
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_constraint_weight
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: animation
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
