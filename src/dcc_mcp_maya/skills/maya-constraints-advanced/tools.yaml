defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: add_pole_vector_constraint
  group: animation

- name: bake_constraint
  group: animation

- name: get_constraint_weights
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: animation

- name: set_constraint_weight
  annotations:
    idempotent_hint: true
  group: animation
