defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: add_constraint
  group: animation

- name: create_constraint_weighted
  group: animation

- name: list_constraints
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: animation

- name: remove_constraint
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: animation
