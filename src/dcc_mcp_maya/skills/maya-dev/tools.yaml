tools:
- name: attach_project
  source_file: scripts/attach_project.py
  description: Attach a local Maya tool project to the live Maya Python session by adding
    its root (and optional src/ directory) to sys.path. Use this once before run_entrypoint/run_script.
    Set DCC_MCP_MAYA_DEV_ROOTS to restrict trusted roots in studio deployments.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: true
  group: development
  inputSchema:
    type: object
    required: [project_root]
    properties:
      project_root:
        type: string
        description: Absolute path to the Python/Maya tool project root.
      name:
        type: string
        description: Optional session label; defaults to the directory name.
      package_prefixes:
        description: Package/module prefixes to hot-reload, e.g. ["my_tool"].
        oneOf:
        - type: string
        - type: array
          items:
            type: string
      include_src:
        type: boolean
        default: true
        description: Also add project_root/src to sys.path when it exists.
      make_active:
        type: boolean
        default: true
        description: Make this project the default target for later dev tools.
- name: reload_modules
  source_file: scripts/reload_modules.py
  description: Purge or reload modules that belong to the attached development project.
    Default mode=purge removes matching modules from sys.modules so the next import
    sees edited files, which is usually safer than importlib.reload in long-lived Maya
    sessions.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: true
  group: development
  inputSchema:
    type: object
    properties:
      project_name:
        type: string
        description: Attached project label; defaults to the active project.
      package_prefixes:
        description: Override package/module prefixes for this reload.
        oneOf:
        - type: string
        - type: array
          items:
            type: string
      mode:
        type: string
        enum: [purge, reload]
        default: purge
        description: purge removes modules from sys.modules; reload calls importlib.reload.
- name: run_entrypoint
  source_file: scripts/run_entrypoint.py
  description: Run a callable from the attached development project inside Maya, with
    stdout/stderr/traceback captured into the result envelope. Use target="package.module:function"
    or module + callable.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
  group: development
  inputSchema:
    type: object
    properties:
      target:
        type: string
        description: Shorthand "package.module:function". Overrides module/callable
          when supplied.
      module:
        type: string
        description: Python module to import when target is not supplied.
      callable:
        type: string
        default: main
        description: Callable attribute path inside module.
      args:
        type: array
        description: Positional JSON arguments.
      kwargs:
        type: object
        description: Keyword JSON arguments.
      project_name:
        type: string
        description: Attached project label; defaults to the active project.
      reload_before:
        type: boolean
        default: true
      reload_mode:
        type: string
        enum: [purge, reload]
        default: purge
      capture_output:
        type: boolean
        default: true
      chdir_project:
        type: boolean
        default: true
- name: run_script
  source_file: scripts/run_script.py
  description: Run a project-local .py script with sys.argv, cwd, stdout/stderr, traceback,
    and elapsed time captured. The script must live under the attached project root.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
  group: development
  inputSchema:
    type: object
    required: [script_path]
    properties:
      script_path:
        type: string
        description: Project-relative or absolute path to a .py file under the attached
          root.
      argv:
        description: Arguments exposed through sys.argv[1:].
        oneOf:
        - type: string
        - type: array
          items:
            type: string
      project_name:
        type: string
      reload_before:
        type: boolean
        default: true
      reload_mode:
        type: string
        enum: [purge, reload]
        default: purge
      capture_output:
        type: boolean
        default: true
      chdir_project:
        type: boolean
        default: true
- name: start_debugpy
  source_file: scripts/start_debugpy.py
  description: Try to start an optional debugpy listener inside the Maya process so
    Cursor or VS Code can attach breakpoints before MCP-triggered project code runs.
    If debugpy is absent, returns debugpy_missing with install guidance. Returns
    core-compatible debug-session metadata, suggested path mappings, and optional
    debugpy log location.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: true
  group: development
  inputSchema:
    type: object
    properties:
      host:
        type: string
        default: 127.0.0.1
      port:
        type: integer
        minimum: 1
        maximum: 65535
        default: 5678
      wait_for_client:
        type: boolean
        default: false
        description: Block until an IDE attaches. Usually keep false for agent workflows.
      configure_python:
        type: boolean
        default: true
        description: Configure debugpy's Python executable from the Maya runtime when possible.
      python_executable:
        type: string
        description: Optional explicit Python/mayapy executable for debugpy.configure(python=...).
      log_dir:
        type: string
        description: Optional directory passed to debugpy.log_to; defaults to DCC_MCP_MAYA_DEBUGPY_LOG_DIR.
      path_mappings:
        type: array
        description: Optional IDE path mapping hints.
        items:
          type: object
          properties:
            local_root:
              type: string
            remote_root:
              type: string
- name: capture_ui
  source_file: scripts/capture_ui.py
  description: Capture the Maya main window or a named Qt widget as a base64 PNG. Use
    this for debugging custom tool windows and dock controls; use maya-render capture_viewport
    for viewport imagery.
  execution: async
  affinity: main
  timeout_hint_secs: 60
  annotations:
    read_only_hint: true
    idempotent_hint: false
  group: development
  inputSchema:
    type: object
    properties:
      object_name:
        type: string
        description: Optional Qt objectName or windowTitle to capture instead of the
          whole main window.
- name: ui_snapshot
  source_file: scripts/ui_snapshot.py
  description: Return a bounded tree of visible Maya Qt widgets using the core UI automation
    contract. Use before ui_find/ui_action when an agent needs UI structure.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: development
  inputSchema:
    type: object
    properties:
      object_name:
        type: string
        description: Optional Qt objectName/windowTitle to use as the snapshot root.
      max_depth:
        type: integer
        minimum: 0
        default: 4
      max_nodes:
        type: integer
        minimum: 1
        default: 200
      include_invisible:
        type: boolean
        default: false
- name: ui_find
  source_file: scripts/ui_find.py
  description: Find Maya Qt widgets by objectName, role/class, text, window title,
    tooltip, or fuzzy label. Returns stable session-scoped UiRef IDs for ui_action.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: development
  inputSchema:
    type: object
    properties:
      query:
        type: string
      object_name:
        type: string
      role:
        type: string
      label:
        type: string
      text:
        type: string
      window_title:
        type: string
      tooltip:
        type: string
      limit:
        type: integer
        minimum: 1
        default: 20
      include_invisible:
        type: boolean
        default: false
      fuzzy:
        type: boolean
        default: true
- name: ui_action
  source_file: scripts/ui_action.py
  description: Perform a bounded action on a unique Maya Qt control. Prefer passing
    control_id from ui_find/ui_snapshot; locator fields are accepted only when they
    resolve to exactly one enabled visible control.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: false
  group: development
  inputSchema:
    type: object
    required: [action]
    properties:
      action:
        type: string
        enum: [click, set_text, toggle, set_checked, select_option, focus]
      control_id:
        type: string
      query:
        type: string
      object_name:
        type: string
      role:
        type: string
      label:
        type: string
      text:
        type: string
        description: Locator text, or value for set_text when value is omitted.
      window_title:
        type: string
      tooltip:
        type: string
      value:
        type: string
        description: New text for set_text.
      checked:
        type: boolean
        description: Desired state for set_checked.
      option:
        type: string
        description: Option label for select_option.
      capture_screenshots:
        type: boolean
        default: false
        description: Capture before/after PNG artifact refs for action evidence.
- name: make_node_ref
  source_file: scripts/make_node_ref.py
  description: Return a stable JSON reference for a Maya node including long name,
    short name, type, UUID when available, existence, stale status, and scene metadata.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: development
  inputSchema:
    type: object
    required: [node]
    properties:
      node:
        type: string
        description: Maya node name, long DAG path, or unique short name.
- name: resolve_node_ref
  source_file: scripts/resolve_node_ref.py
  description: Resolve a previously returned Maya node reference by UUID, long name,
    or short name and report a structured stale-reference error if it no longer exists.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: development
  inputSchema:
    type: object
    properties:
      ref:
        type: object
        description: NodeRef returned by make_node_ref or another Maya tool.
      uuid:
        type: string
      long_name:
        type: string
      short_name:
        type: string
- name: run_check
  source_file: scripts/run_check.py
  description: 'Development convenience wrapper: reload project modules, run an entrypoint,
    capture stdout/stderr/traceback, optionally capture a Maya UI screenshot, and return
    artifact refs for large diagnostics. Use after editing project code to verify behavior
    inside the live Maya session.'
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    read_only_hint: false
    idempotent_hint: false
  group: development
  inputSchema:
    type: object
    properties:
      target:
        type: string
        description: Shorthand "package.module:function".
      module:
        type: string
      callable:
        type: string
        default: main
      args:
        type: array
      kwargs:
        type: object
      project_name:
        type: string
      reload_before:
        type: boolean
        default: true
      reload_mode:
        type: string
        enum: [purge, reload]
        default: purge
      capture_ui_image:
        type: boolean
        default: false
      ui_object_name:
        type: string
        description: Optional Qt objectName/windowTitle when capture_ui_image=true.
      artifact_threshold:
        type: integer
        minimum: 1
        default: 4096
        description: Inline text length at which run_check also writes a text artifact reference.
