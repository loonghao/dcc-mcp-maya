tools:
- name: connect_dynamic_field
  description: Connect or disconnect an existing dynamic field from dynamic targets.
  execution: async
  affinity: main
  timeout_hint_secs: 600
  annotations:
    idempotent_hint: true
  group: dynamics
  input_schema:
    type: object
    required:
    - targets
    - field
    properties:
      targets:
        oneOf:
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
      field:
        type: string
      disconnect:
        type: boolean
        default: false
- name: create_gravity_field
  description: Create a gravity field and optionally connect it to dynamic targets.
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: dynamics
  input_schema:
    type: object
    properties:
      name:
        type: string
        default: mcp_gravity
      magnitude:
        type: number
        default: 9.8
      direction:
        type: array
        items:
          type: number
        minItems: 3
        maxItems: 3
        default:
        - 0.0
        - -1.0
        - 0.0
      attenuation:
        type: number
        default: 0.0
      position:
        type: array
        items:
          type: number
        minItems: 3
        maxItems: 3
      targets:
        oneOf:
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
      connect:
        type: boolean
        default: true
- name: list_dynamics
  description: List rigid bodies, dynamic fields, and rigid constraints.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: dynamics
  input_schema:
    type: object
    properties:
      include_connections:
        type: boolean
        default: true
- name: make_rigid_body
  description: Add active or passive rigid bodies to selected or named scene objects.
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: dynamics
  input_schema:
    type: object
    properties:
      objects:
        oneOf:
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
      mode:
        type: string
        enum:
        - active
        - passive
        default: active
      name_prefix:
        type: string
      mass:
        type: number
        default: 1.0
      bounciness:
        type: number
        default: 0.6
      damping:
        type: number
        default: 0.0
      static_friction:
        type: number
        default: 0.2
      dynamic_friction:
        type: number
        default: 0.2
      collisions:
        type: boolean
        default: true
- name: set_rigid_body_properties
  description: Edit common physical properties on existing rigid body nodes.
  execution: async
  affinity: main
  timeout_hint_secs: 600
  annotations:
    idempotent_hint: true
  group: dynamics
  input_schema:
    type: object
    required:
    - rigid_bodies
    properties:
      rigid_bodies:
        oneOf:
        - type: string
        - type: array
          items:
            type: string
          minItems: 1
      mode:
        type: string
        enum:
        - active
        - passive
      mass:
        type: number
      bounciness:
        type: number
      damping:
        type: number
      static_friction:
        type: number
      dynamic_friction:
        type: number
      collisions:
        type: boolean
