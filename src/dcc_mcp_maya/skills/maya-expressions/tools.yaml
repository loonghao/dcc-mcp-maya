defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: create_expression
  group: animation

- name: delete_expression
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: animation

- name: edit_expression
  group: animation

- name: list_expressions
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: animation
