tools:
- name: create_fluid_container
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: delete_fluid_container
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: list_fluid_containers
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_fluid_attribute
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
