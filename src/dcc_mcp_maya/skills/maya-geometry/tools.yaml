tools:
- name: file_exists
  description: Check whether a file exists on disk.
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
  input_schema:
    type: object
    required:
    - path
    properties:
      path:
        type: string
        description: Path to test for existence.
- name: export_fbx
  description: "Export the current Maya scene or selection to FBX. Animation is baked\n\
    by default so constraints / IK / driven keys round-trip correctly.\nAll FBXExport*\
    \ options are pushed via mel.eval before cmds.file is\ncalled, and the destination\
    \ is verified for non-zero size afterwards.\nPrefer this over raw ``FBXExport``\
    \ MEL from ``execute_mel`` / ``execute_python`` \u2014 the tool sets the correct\
    \ MEL command spelling and plugin state.\n"
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
  group: geometry
  input_schema:
    type: object
    required:
    - path
    properties:
      path:
        type: string
      selected_only:
        type: boolean
        default: false
      bake_animation:
        type: boolean
        default: true
      start_frame:
        type: integer
      end_frame:
        type: integer
      step:
        type: integer
        default: 1
        minimum: 1
      up_axis:
        type: string
        enum:
        - y
        - z
      embed_media:
        type: boolean
        default: false
      fbx_version:
        type: string
        enum:
        - FBX202000
        - FBX201900
        - FBX201800
        - FBX201600
        - FBX201400
      ascii:
        type: boolean
        default: false
      cameras:
        type: boolean
        default: true
      lights:
        type: boolean
        default: true
      constraints:
        type: boolean
        default: true
      smoothing_groups:
        type: boolean
        default: true
      triangulate:
        type: boolean
        default: false
      instances:
        type: boolean
        default: false
      tangents_binormals:
        type: boolean
        default: false
- name: import_file
  description: Import a generic Maya-recognised scene or geometry file into the current
    scene for interchange. Automatically checks and loads known required plug-ins for
    FBX (fbxmaya), OBJ (objExport), and Alembic (AbcImport) before import. Use import_fbx
    when you need FBX-specific take, namespace, and diagnostics controls.
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
  group: geometry
  input_schema:
    type: object
    required:
    - file_path
    properties:
      file_path:
        type: string
        description: Source file path. Must be readable by Maya or a loaded plug-in.
      namespace:
        type: string
        description: Optional namespace prefix for imported nodes.
      merge_namespaces:
        type: boolean
        default: false
        description: Merge into an existing namespace on clashes.
- name: import_fbx
  description: 'Import an FBX file into the current scene. Returns the new node list
  
    (short + long names) so follow-up tools can act on exactly what was
  
    just imported. Optional namespace and post-import grouping.
  
    '
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
  group: geometry
  input_schema:
    type: object
    required:
    - path
    properties:
      path:
        type: string
        description: Source .fbx path. Must exist on disk.
      namespace:
        type: string
        description: Optional namespace prefix for imported nodes.
      group_name:
        type: string
        description: Optional name for a wrapper transform created at the world root.
      merge_namespaces:
        type: boolean
        default: false
        description: Merge into an existing namespace instead of generating a numeric
          suffix.
      generate_log:
        type: boolean
        default: false
        description: Write FBXImport diagnostics to the Script Editor.
      take:
        type: integer
        minimum: 1
        description: Animation take index (1-based) for files with multiple takes.
- name: export_obj
  description: "Export the current Maya scene (or selection, per script) to Wavefront\
    \ OBJ at an absolute or workspace-relative path. Parent directory must exist; large\
    \ meshes may take minutes \u2014 keep timeout_hint in mind. Not a substitute for\
    \ FBX when animation or materials must round-trip \u2014 use maya_geometry__export_fbx\
    \ instead."
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
  group: geometry
  input_schema:
    type: object
    required:
    - path
    properties:
      path:
        type: string
        description: Destination .obj path.
- name: export_alembic
  description: Export the current selection (or specified objects) to Alembic (.abc).
    Loads the AbcExport plugin automatically.  For shot-level sequence export with frame-range
    control, prefer maya_shot_export__export_shot_alembic.
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
  group: geometry
  input_schema:
    type: object
    required:
    - file_path
    properties:
      file_path:
        type: string
        description: Destination .abc path.
      objects:
        type: array
        items:
          type: string
        description: Objects to export. Defaults to current selection.
      world_space:
        type: boolean
        default: true
        description: Write geometry in world space.
      uv_write:
        type: boolean
        default: true
        description: Write UV sets.
      write_visibility:
        type: boolean
        default: true
        description: Write visibility state.
