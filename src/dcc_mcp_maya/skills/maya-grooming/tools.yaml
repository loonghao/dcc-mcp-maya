defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: add_nhair_cache
  execution: async

  timeout_hint_secs: 300
  group: simulation-fx

- name: create_nhair_system
  execution: async

  timeout_hint_secs: 300
  group: simulation-fx

- name: list_hair_systems
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: set_nhair_attribute
  annotations:
    idempotent_hint: true
  group: simulation-fx
