defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: list_hdri_nodes
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: shading-lighting

- name: load_hdri
  group: shading-lighting

- name: set_hdri_exposure
  annotations:
    idempotent_hint: true
  group: shading-lighting

- name: set_hdri_rotation
  annotations:
    idempotent_hint: true
  group: shading-lighting
