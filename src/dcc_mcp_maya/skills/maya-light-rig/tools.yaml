defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: create_hdri_dome
  group: shading-lighting

- name: create_three_point_rig
  group: shading-lighting

- name: list_light_rigs
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: shading-lighting

- name: set_light_rig_intensity
  annotations:
    idempotent_hint: true
  group: shading-lighting
