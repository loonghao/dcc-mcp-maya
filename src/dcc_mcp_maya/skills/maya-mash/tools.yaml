defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: add_node
  group: simulation-fx

- name: create_network
  group: simulation-fx

- name: delete_network
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: list_networks
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: set_mash_attribute
  annotations:
    idempotent_hint: true
  group: simulation-fx
