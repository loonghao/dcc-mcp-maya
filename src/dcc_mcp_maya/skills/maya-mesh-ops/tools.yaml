  enforce_thread_affinity: true
  group: modeling
  description: Select objects by material in the current Maya scene.
- name: separate_mesh
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  group: modeling
  description: Separate mesh data in the current Maya scene.
- name: triangulate
  execution: sync
  affinity: main
