defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: bake_mocap_to_rig
  execution: async

  timeout_hint_secs: 300
  group: animation

- name: clean_mocap_keys
  group: animation

- name: create_hik_definition
  group: animation

- name: import_mocap
  execution: async

  timeout_hint_secs: 300
  group: animation
