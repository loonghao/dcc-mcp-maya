defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: apply_muscle_skin
  execution: async

  timeout_hint_secs: 300
  annotations:
    idempotent_hint: true
  group: rigging

- name: create_muscle_capsule
  group: rigging

- name: list_muscles
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rigging

- name: set_muscle_attribute
  annotations:
    idempotent_hint: true
  group: rigging
