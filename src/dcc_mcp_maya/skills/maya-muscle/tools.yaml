tools:
- name: apply_muscle_skin
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    idempotent_hint: true
  group: rigging
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_muscle_capsule
  execution: sync
  affinity: main
  group: rigging
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: list_muscles
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rigging
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_muscle_attribute
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: rigging
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
