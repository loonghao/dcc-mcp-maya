defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: add_ocean_wake
  group: simulation-fx

- name: create_ocean
  execution: async

  timeout_hint_secs: 300
  group: simulation-fx

- name: list_ocean_surfaces
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: set_ocean_attribute
  annotations:
    idempotent_hint: true
  group: simulation-fx
