tools:
- name: add_ocean_wake
  execution: sync
  affinity: main
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_ocean
  execution: async
  affinity: main
  timeout_hint_secs: 300
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: list_ocean_surfaces
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_ocean_attribute
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: simulation-fx
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
