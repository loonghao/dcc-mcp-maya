defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: attach_stroke_to_surface
  group: simulation-fx

- name: create_stroke
  group: simulation-fx

- name: delete_stroke
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: list_strokes
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx
