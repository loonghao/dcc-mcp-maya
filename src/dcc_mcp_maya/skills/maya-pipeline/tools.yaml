defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: get_asset_metadata
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management

- name: publish_asset
  group: scene-management

- name: set_project
  annotations:
    idempotent_hint: true
  group: scene-management

- name: tag_asset_metadata
  group: scene-management
