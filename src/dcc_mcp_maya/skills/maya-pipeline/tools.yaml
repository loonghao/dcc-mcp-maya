tools:
- name: get_asset_metadata
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: publish_asset
  execution: sync
  affinity: main
  group: scene-management
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_project
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: scene-management
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: tag_asset_metadata
  execution: sync
  affinity: main
  group: scene-management
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
