defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: list_poses
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: animation

- name: load_pose
  group: animation

- name: mirror_pose
  group: animation

- name: save_pose
  group: animation
