tools:
- name: create_cube
  description: Create a polygon cube
  execution: sync
  affinity: main
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_cylinder
  description: Create a polygon cylinder
  execution: sync
  affinity: main
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_plane
  description: Create a polygon plane
  execution: sync
  affinity: main
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_sphere
  description: Create a polygon sphere
  execution: sync
  affinity: main
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: delete_objects
  description: Delete objects from the Maya scene
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: get_transform
  description: Get translate/rotate/scale of an object
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: rename_object
  description: Rename an object in the scene
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_transform
  description: Set translate/rotate/scale on an object
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: modeling
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
