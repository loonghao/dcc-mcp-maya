defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: create_proxy
  group: modeling

- name: list_proxies
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: modeling

- name: set_proxy_attribute
  annotations:
    idempotent_hint: true
  group: modeling

- name: swap_proxy
  group: modeling
