defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: get_render_job_status
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering

- name: submit_to_deadline
  execution: async

  timeout_hint_secs: 900
  group: rendering

- name: validate_scene_for_farm
  execution: async

  timeout_hint_secs: 900
  group: rendering

- name: write_render_job
  execution: async

  timeout_hint_secs: 900
  group: rendering
