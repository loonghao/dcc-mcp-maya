tools:
- name: get_render_job_status
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
- name: submit_to_deadline
  execution: async
  affinity: main
  timeout_hint_secs: 900
  group: rendering
- name: validate_scene_for_farm
  execution: async
  affinity: main
  timeout_hint_secs: 900
  group: rendering
- name: write_render_job
  execution: async
  affinity: main
  timeout_hint_secs: 900
  group: rendering
