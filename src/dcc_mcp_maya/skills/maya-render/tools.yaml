tools:
- name: capture_viewport
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: export_selection
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: get_render_settings
  description: Query current render settings
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: get_scene_render_stats
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: import_file
  execution: async
  affinity: main
  timeout_hint_secs: 300
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: playblast
  description: Capture a viewport screenshot as a base64-encoded PNG
  execution: async
  affinity: main
  timeout_hint_secs: 600
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_render_quality
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_render_settings
  description: Set render parameters (resolution, frame range, renderer, image format)
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: rendering
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
