tools:
- name: center_pivot
  execution: sync
  affinity: main
  group: scene-management
  description: Center pivot in the current Maya scene.
- name: create_locator
  execution: sync
  affinity: main
  group: scene-management
  description: Create a locator in the current Maya scene.
- name: duplicate_object
  execution: sync
  affinity: main
  group: scene-management
  description: Duplicate an object in the current Maya scene.
- name: freeze_transforms
  execution: sync
  affinity: main
  group: scene-management
  description: Freeze transforms in the current Maya scene.
- name: get_bounding_box
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
  description: Get an object bounding box without modifying the Maya scene.
- name: get_scene_info
  description: Return a hierarchical DAG description of the current scene
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
- name: find_by_pattern
  description: Find nodes by Maya wildcard pattern, defaulting to transform nodes
    so object searches exclude shapes and animation curves.
  execution: sync
  affinity: main
  group: scene-management
  annotations:
    read_only_hint: true
    idempotent_hint: true
  inputSchema:
    type: object
    required:
    - pattern
    properties:
      pattern:
        type: string
        description: Name pattern using Maya wildcard syntax, such as mcp_ball_*.
      type:
        type:
        - string
        - 'null'
        default: transform
        description: Optional Maya node type filter. Pass null or an empty string
          to disable filtering.
- name: get_selection
  description: Return the current Maya selection
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
- name: get_session_info
  description: Return Maya version, scene path, and basic session statistics
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
- name: group_objects
  description: Group a list of objects under a new transform node.
  execution: sync
  affinity: main
  inputSchema:
    type: object
    required:
    - objects
    properties:
      objects:
        type: array
        items:
          type: string
        minItems: 1
        description: Names of the objects to group.
      group_name:
        type: string
        description: Optional name for the new group node.
      world:
        type: boolean
        default: false
        description: When true, parent the group at the world root.
- name: list_cameras
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
  description: List cameras without modifying the Maya scene.
- name: list_objects
  description: List objects in the current Maya scene. For wildcard name searches,
    prefer find_by_pattern with type=transform to avoid matching shape or animation-curve
    nodes.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
- name: lock_object
  execution: sync
  affinity: main
  group: scene-management
  description: Lock an object in the current Maya scene.
- name: new_scene
  description: Create a new empty Maya scene
  execution: async
  affinity: main
  timeout_hint_secs: 60
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management
  inputSchema:
    type: object
    properties:
      force:
        type: boolean
        default: false
        description: Discard unsaved changes without prompting.
      safe_dirty_check:
        type: boolean
        default: true
        description: Return a structured error on dirty scenes instead of allowing a Maya save prompt.
- name: open_scene
  description: Open a Maya scene file from disk
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management
  inputSchema:
    type: object
    required:
    - file_path
    properties:
      file_path:
        type: string
        description: Absolute or workspace-relative .ma/.mb file to open.
      force:
        type: boolean
        default: false
        description: Discard unsaved changes without prompting.
      safe_dirty_check:
        type: boolean
        default: true
        description: Return a structured error on dirty scenes instead of allowing a Maya save prompt.
- name: parent_object
  execution: sync
  affinity: main
  group: scene-management
  description: Parent an object in the current Maya scene.
- name: save_scene
  description: >-
    Canonical native Maya scene save. Saves the current scene in place, or first
    renames it to file_path before saving as mayaAscii or mayaBinary. Use this
    for .ma/.mb persistence; use maya_geometry__export_fbx or
    maya_geometry__export_obj for interchange files.
  execution: async
  affinity: main
  timeout_hint_secs: 120
  group: scene-management
  inputSchema:
    type: object
    properties:
      file_path:
        type: string
        description: Optional absolute or workspace-relative .ma/.mb destination path.
      file_type:
        type: string
        enum:
        - mayaAscii
        - mayaBinary
        default: mayaBinary
- name: select_by_type
  execution: sync
  affinity: main
  group: scene-management
  description: Select by type in the current Maya scene.
- name: set_frame_rate
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: scene-management
  description: Set the frame rate in the current Maya scene.
- name: set_selection
  description: Set the active Maya selection
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: scene-management
- name: set_visibility
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: scene-management
  description: Set object visibility in the current Maya scene.
