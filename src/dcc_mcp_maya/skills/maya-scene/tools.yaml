tools:
- name: center_pivot
  execution: sync
  affinity: main
  group: scene-management
- name: create_locator
  execution: sync
  affinity: main
  group: scene-management
- name: duplicate_object
  execution: sync
  affinity: main
  group: scene-management
- name: export_scene
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
- name: freeze_transforms
  execution: sync
  affinity: main
  group: scene-management
- name: get_bounding_box
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
- name: get_scene_info
  description: Return a hierarchical DAG description of the current scene
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
- name: get_selection
  description: Return the current Maya selection
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
- name: get_session_info
  description: Return Maya version, scene path, and basic session statistics
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
- name: group_objects
  description: Group a list of objects under a new transform node.
  execution: sync
  affinity: main
  inputSchema:
    type: object
    required: [objects]
    properties:
      objects:
        type: array
        items:
          type: string
        minItems: 1
        description: Names of the objects to group.
      group_name:
        type: string
        description: Optional name for the new group node.
      world:
        type: boolean
        default: false
        description: When true, parent the group at the world root.
- name: list_cameras
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
- name: list_objects
  description: List objects in the current Maya scene
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management
- name: lock_object
  execution: sync
  affinity: main
  group: scene-management
- name: new_scene
  description: Create a new empty Maya scene
  execution: async
  affinity: main
  timeout_hint_secs: 60
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management
- name: open_scene
  description: Open a Maya scene file from disk
  execution: async
  affinity: main
  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management
- name: parent_object
  execution: sync
  affinity: main
  group: scene-management
- name: save_scene
  description: Save the current Maya scene
