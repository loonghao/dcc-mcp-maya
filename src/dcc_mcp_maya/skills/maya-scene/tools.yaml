defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: center_pivot
  group: scene-management

- name: create_locator
  group: scene-management

- name: duplicate_object
  group: scene-management

- name: export_scene
  execution: async

  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management

- name: freeze_transforms
  group: scene-management

- name: get_bounding_box
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management

- name: get_scene_info
  description: Return a hierarchical DAG description of the current scene

  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core

- name: get_selection
  description: Return the current Maya selection

  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core

- name: get_session_info
  description: Return Maya version, scene path, and basic session statistics

  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core

- name: group_objects

- name: list_cameras
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management

- name: list_objects
  description: List objects in the current Maya scene

  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management

- name: lock_object
  group: scene-management

- name: new_scene
  description: Create a new empty Maya scene
  execution: async

  timeout_hint_secs: 60
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management

- name: open_scene
  description: Open a Maya scene file from disk
  execution: async

  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management

- name: parent_object
  group: scene-management

- name: save_scene
  description: Save the current Maya scene
  execution: async

  timeout_hint_secs: 120
  group: scene-management

- name: select_by_type
  group: scene-management

- name: set_frame_rate
  annotations:
    idempotent_hint: true
  group: scene-management

- name: set_selection
  description: Set the active Maya selection

  annotations:
    idempotent_hint: true
  group: scene-management

- name: set_visibility
  annotations:
    idempotent_hint: true
  group: scene-management
