tools:
- name: execute_mel
  description: "Last-resort arbitrary MEL. Prefer search_skills \u2192 load_skill \u2192\
    \ typed tools. Inline MEL uses `code`; studio `.mel` files use `file_path` / `script_path`\
    \ and are sourced with forward slashes."
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    read_only_hint: false
  group: core
  inputSchema:
    type: object
    properties:
      code:
        type: string
        description: Inline MEL to evaluate (required when file_path is omitted).
      file_path:
        type: string
        description: Path to a .mel file; sources via MEL `source` (native). Alias `script_path`.
      script_path:
        type: string
        description: Same as file_path.
- name: execute_python
  description: "Bare-exec Python in Maya \u2014 wrapper-free dispatch, persistent module-level\
    \ namespace (`import x` survives across calls), AST-rewrite captures last expression's\
    \ value when `result_type != NONE`. Concurrency-safe: every off-main-thread call\
    \ is funneled through a single-writer FIFO queue (configurable depth via DCC_MCP_MAYA_EXEC_QUEUE_DEPTH,\
    \ default 64) and marshaled to Maya's UI thread with executeInMainThreadWithResult.\
    \ Bursty agents that exceed the queue depth get a clean QueueFullError envelope\
    \ (back off + retry) instead of a Maya hang. The persistent namespace pre-binds\
    \ `cmds` and `mel` so user code can call them without an explicit import. Aligned\
    \ with PatrickPalmer/maya-mcp-server semantics. Prefer search_skills / dcc_capability_manifest\
    \ \u2192 load_skill \u2192 typed tools when one fits. For long scripts, upload\
    \ once via write_module then call with `import name; name.run()`."
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    read_only_hint: false
  group: core
  inputSchema:
    type: object
    properties:
      code:
        type: string
        description: Inline Python (required when file_path is omitted).
      file_path:
        type: string
        description: Absolute path to a .py file executed in __main__ with __file__
          / this_root.
      script_path:
        type: string
        description: Same as file_path.
      result_type:
        type: string
        enum:
        - NONE
        - VALUE
        - JSON
        - REPR
        default: NONE
        description: How to capture the last expression's value. NONE discards.
      capture_output:
        type: boolean
        default: true
        description: Redirect sys.stdout / sys.stderr into the returned envelope.
      inplace:
        type: boolean
        default: false
        description: "Skip the automatic main-thread marshalling. By default, when the\
          \ MCP handler runs off Maya's UI thread (hyper worker), user code is wrapped\
          \ in maya.utils.executeInMainThreadWithResult so cmds.file / loadPlugin /\
          \ scene-mutating cmds.* calls stay on the safe thread. Set inplace=true to\
          \ opt out \u2014 only do this when you have already dispatched onto the main\
          \ thread yourself or when the script touches no Maya state."
- name: write_module
  description: "Inject a Python module into Maya's sys.modules from a source string.\
    \ Same shape as maya-mcp-server's write_module. Use this to upload long scripts\
    \ ONCE then call `execute_python(code='import name; name.run()')` many times \u2014\
    \ saves the agent prompt budget on repeated dispatch."
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    read_only_hint: false
  group: core
  inputSchema:
    type: object
    required:
    - name
    - source
    properties:
      name:
        type: string
        description: Dotted module name (each segment must be a valid Python identifier).
      source:
        type: string
        description: Python source for the module body.
      overwrite:
        type: boolean
        default: true
        description: When true, re-exec the source against the existing module's __dict__.
      version:
        type: string
        description: Optional opaque version stamped as __dcc_mcp_module_version__.
- name: io
  description: "Session-scope stdout / stderr capture lifecycle for Maya \u2014 single\
    \ tool with `action` selector (install / uninstall / get / clear / status). Lets\
    \ agents accumulate output across many execute_python calls without per-call capture\
    \ overhead."
  execution: sync
  affinity: main
  annotations:
    read_only_hint: false
    idempotent_hint: true
  group: core
  inputSchema:
    type: object
    required:
    - action
    properties:
      action:
        type: string
        enum:
        - install
        - uninstall
        - get
        - clear
        - status
      drain:
        type: boolean
        default: true
        description: "For action=get \u2014 drain the buffer (default) or peek without\
          \ consuming."
- name: get_script_node
  description: Get, create, or delete a Maya scriptNode.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
  inputSchema:
    type: object
    required:
    - node_name
    properties:
      node_name:
        type: string
        description: scriptNode name in the scene.
      action:
        type: string
        enum:
        - get
        - create
        - delete
        default: get
        description: Operation to perform on the scriptNode.
      script:
        type: string
        description: Script body (required when `action=create`).
      script_type:
        type: integer
        enum:
        - 0
        - 1
        - 2
        - 3
        default: 0
        description: 0=demand, 1=open/close, 2=ui create, 3=ui delete.
- name: list_mel_procedures
  description: List MEL procedures without modifying the Maya scene.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
- name: introspect_list_module
  description: Introspect list module for agent-facing Maya scripting introspection.
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: introspect
- name: introspect_signature
  description: Introspect a Python callable signature for agent-facing Maya scripting
    introspection.
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: introspect
- name: introspect_search
  description: Introspect Python introspection search results for agent-facing Maya
    scripting introspection.
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: introspect
- name: introspect_eval
  description: Introspect a Python introspection expression for agent-facing Maya scripting
    introspection.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
  group: introspect
