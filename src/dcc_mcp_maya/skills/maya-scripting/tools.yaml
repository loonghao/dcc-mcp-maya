tools:
- name: execute_mel
  description: |-
    Last-resort arbitrary MEL. Prefer search_skills → load_skill → typed tools with inputSchema.
    When talking through dcc-mcp-gateway, use the gateway REST surface (POST /v1/search,
    /v1/describe, /v1/call or /v1/call_batch on the gateway port) instead of assuming clients
    must open each Maya session's /mcp URL. Inline MEL requires `code`. Studio `.mel` files:
    pass `file_path` (or `script_path`) — runs `mel.eval('source "..."')` with forward slashes.
    Unset DCC_MCP_MAYA_DISABLE_EXECUTE_MEL or DCC_MCP_MAYA_DISABLE_ARBITRARY_SCRIPT if blocked.
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    read_only_hint: false
  group: core
  inputSchema:
    type: object
    properties:
      code:
        type: string
        description: Inline MEL to evaluate (required when file_path is omitted).
      file_path:
        type: string
        description: Path to a .mel file; sources via MEL `source` (native). Alias `script_path`.
      script_path:
        type: string
        description: Same as file_path.
- name: execute_python
  description: |-
    Last-resort arbitrary Python. Default path: search_skills / dcc_capability_manifest → load_skill
    → typed tools with inputSchema. Gateway / non-MCP clients: prefer POST /v1/search, /v1/describe,
    /v1/call (or /v1/call_batch) on the gateway host:port — do not document only the per-Maya /mcp
    URL as if it were the primary integration surface.
    **Long or escaping-heavy scripts:** load the `write_temp_file` skill (or call
    `dcc_mcp_core.script_execution.write_temp_script` from an in-process tool), then call
    `execute_python` with **`file_path`** (or `script_path`) pointing at that ``.py`` file — the path
    must be readable **inside the Maya process host** (not only on an agent laptop behind a remote gateway).
    Inline payloads longer than ~4096 characters are **automatically** mirrored to a host temp file under
    ``~/.dcc-mcp-core/temp_scripts/`` before ``exec``; the response includes ``context.host_spilled_inline_script_path``.
    Inline snippets: use `code` (or `script` / `source`). For studio `.py` files pass `file_path`: runs in
    `__import__('__main__').__dict__` with `__file__` and `this_root` set (Maya-native shelf/pipeline style).
    Captures Python + Script Editor channels (print, cmds.warning, MEL print). defer=true schedules on Maya's
    idle queue and a DeferredToolResult is returned so long-running scripts no longer block the MCP request
    thread, with cooperative cancellation wired in (issue #153). Unset DCC_MCP_MAYA_DISABLE_EXECUTE_PYTHON or
    DCC_MCP_MAYA_DISABLE_ARBITRARY_SCRIPT if blocked.
  execution: sync
  affinity: main
  annotations:
    destructive_hint: true
    read_only_hint: false
  group: core
  inputSchema:
    type: object
    properties:
      code:
        type: string
        description: Inline Python (required when file_path is omitted). cmds pre-imported in the isolated namespace.
      file_path:
        type: string
        description: >-
          Absolute path to a .py file executed in __main__ with __file__ / this_root (Maya-native).
          Preferred for large scripts: use write_temp_file / write_temp_script on a path this Maya process can read.
          Remote-gateway agents must not assume a path on their laptop is visible to Maya.
      script_path:
        type: string
        description: Same as file_path.
      capture_output:
        type: boolean
        description: When true, captured stdout is returned in `context.stdout`. Default
          true.
        default: true
      timeout_secs:
        type: integer
        description: Maximum execution time in seconds. Defaults
          to no limit.
        minimum: 1
      defer:
        type: boolean
        description: When true, schedule code via Maya's deferred queue and return
          a DeferredToolResult that the client polls. Use for long-running scripts
          that would otherwise block the MCP request.
        default: false
- name: get_script_node
  description: Get, create, or delete a Maya scriptNode.
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
  inputSchema:
    type: object
    required:
    - node_name
    properties:
      node_name:
        type: string
        description: scriptNode name in the scene.
      action:
        type: string
        enum:
        - get
        - create
        - delete
        default: get
        description: Operation to perform on the scriptNode.
      script:
        type: string
        description: Script body (required when `action=create`).
      script_type:
        type: integer
        enum:
        - 0
        - 1
        - 2
        - 3
        default: 0
        description: 0=demand, 1=open/close, 2=ui create, 3=ui delete.
- name: list_mel_procedures
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: core
  description: List MEL procedures without modifying the Maya scene.
- name: introspect_list_module
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: introspect
  description: Introspect list module for agent-facing Maya scripting introspection.
- name: introspect_signature
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: introspect
  description: Introspect a Python callable signature for agent-facing Maya scripting
    introspection.
- name: introspect_search
  execution: sync
  affinity: any
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: introspect
  description: Introspect Python introspection search results for agent-facing Maya
    scripting introspection.
- name: introspect_eval
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
  group: introspect
  description: Introspect a Python introspection expression for agent-facing Maya
    scripting introspection.
