defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: add_to_set
  group: scene-management

- name: create_set
  group: scene-management

- name: list_sets
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: scene-management

- name: remove_from_set
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: scene-management
