defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: export_camera
  execution: async

  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true

- name: export_shot_alembic
  execution: async

  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true

- name: export_shot_fbx
  execution: async

  timeout_hint_secs: 300
  annotations:
    read_only_hint: true
    idempotent_hint: true

- name: get_shot_info
  annotations:
    read_only_hint: true
    idempotent_hint: true
