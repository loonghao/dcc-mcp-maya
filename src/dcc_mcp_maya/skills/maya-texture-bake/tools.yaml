defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: bake_ambient_occlusion
  execution: async

  timeout_hint_secs: 600
  group: shading-lighting

- name: bake_lighting
  execution: async

  timeout_hint_secs: 600
  group: shading-lighting

- name: bake_textures
  execution: async

  timeout_hint_secs: 600
  group: shading-lighting

- name: list_bake_sets
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: shading-lighting

- name: list_color_spaces
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: shading-lighting

- name: set_color_management
  annotations:
    idempotent_hint: true
  group: shading-lighting

- name: transfer_maps
  execution: async

  timeout_hint_secs: 600
  group: shading-lighting
