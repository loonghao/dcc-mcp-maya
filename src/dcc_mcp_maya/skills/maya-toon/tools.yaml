tools:
- name: add_toon_outline
  execution: sync
  affinity: main
  group: shading-lighting
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: create_toon_shader
  execution: sync
  affinity: main
  group: shading-lighting
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: list_toon_outlines
  execution: sync
  affinity: main
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: shading-lighting
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

- name: set_outline_width
  execution: sync
  affinity: main
  annotations:
    idempotent_hint: true
  group: shading-lighting
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log
