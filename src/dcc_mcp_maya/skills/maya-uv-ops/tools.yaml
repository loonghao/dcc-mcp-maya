tools:
- name: copy_uvs
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  group: modeling
  description: Copy UVs in the current Maya scene.
- name: create_uv_set
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  group: modeling
  description: Create a UV set in the current Maya scene.
- name: delete_uv_set
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: modeling
  description: Delete a UV set in the current Maya scene.
- name: get_uv_info
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: modeling
  description: Get UV information without modifying the Maya scene.
- name: get_uv_shell_info
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: modeling
  description: Get UV shell information without modifying the Maya scene.
- name: normalize_uvs
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  group: modeling
  description: Normalize UVs in the current Maya scene.
- name: project_uvs
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  group: modeling
  description: Project UVs in the current Maya scene.
- name: unfold_uvs
  execution: sync
  affinity: main
  enforce_thread_affinity: true
  group: modeling
  description: Unfold UVs in the current Maya scene.
