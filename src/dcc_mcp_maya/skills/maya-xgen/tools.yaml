defaults:
  affinity: main
  next-tools:
    on-failure:
    - dcc_diagnostics__screenshot
    - dcc_diagnostics__audit_log

tools:
- name: create_description
  execution: async

  timeout_hint_secs: 300
  group: simulation-fx

- name: delete_description
  execution: async

  timeout_hint_secs: 300
  annotations:
    destructive_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: get_xgen_attribute
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: list_descriptions
  annotations:
    read_only_hint: true
    idempotent_hint: true
  group: simulation-fx

- name: set_xgen_attribute
  annotations:
    idempotent_hint: true
  group: simulation-fx
